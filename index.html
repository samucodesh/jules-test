<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <div class="dashboard-nav" style="text-align: center; margin-bottom: 15px;">
            <a href="dashboard.html">View Task Dashboard</a>
        </div>
        <button id="theme-toggle-button">Toggle Theme</button>
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button id="addButton">Add Task</button>
        <ul id="taskList">
            <!-- Tasks will be added here -->
        </ul>
        <button id="deleteButton">Delete Selected</button>
        <button id="clearButton">Clear Completed</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
